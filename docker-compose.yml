services:
  nginx:
    image: nginx:stable-alpine
    container_name: vertical_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - davilla_network

  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: vertical_php
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql
    networks:
      - davilla_network

  mysql:
    image: mysql:8.0
    container_name: vertical_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vertical
      MYSQL_USER: user
      MYSQL_PASSWORD: user
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - vertical_network

networks:
  vertical_network:
    driver: bridge

volumes:
  mysql_data:
